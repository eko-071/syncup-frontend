<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SyncUp Login</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .heading {
      font-family: 'Playfair Display', serif;
    }
  </style>
</head>

<body class="bg-black text-white">

  <div class="min-h-screen flex items-center justify-center px-6">
    
    <!-- Container -->
    <div class="flex w-full max-w-6xl items-center justify-between gap-16">

      <!-- LEFT IMAGE CARD -->
      <div class="hidden md:block w-[420px] h-[520px] rounded-2xl overflow-hidden border border-gray-300 relative">
        <img 
          src="./pic.jpg.jpeg" 
          class="w-full h-full object-cover"
        />

        <!-- Overlay text -->
        <div class="absolute bottom-6 left-6 right-6 text-white">
          <p class="heading text-2xl leading-snug">
            Match-making Platform for Hackathons and Projects
          </p>
        </div>
      </div>

      <!-- RIGHT LOGIN FORM -->
      <div class="w-full max-w-md">

        <h1 class="heading text-4xl text-blue-300 mb-3">
          SyncUp: Log in
        </h1>

        <p class="text-gray-400 mb-10">
          A platform to build, team up & collaborate
        </p>

        <!-- Email -->
        <label class="block mb-2 text-gray-300">Your email</label>
        <input 
          type="email" 
          class="w-full mb-6 px-5 py-3 rounded-full bg-gray-700 text-white outline-none border border-gray-500 focus:border-blue-400"
        >

        <!-- Password -->
        <label class="block mb-2 text-gray-300">Password</label>
        <div class="relative mb-10">
          <input 
            type="password" 
            class="w-full px-5 py-3 rounded-full bg-gray-700 text-white outline-none border border-gray-500 focus:border-blue-400"
          >
          <!-- Eye icon -->
          <span class="absolute right-4 top-3 text-gray-400 cursor-pointer">
            👁
          </span>
        </div>

        <!-- Button -->
        <button class="w-full bg-blue-800 hover:bg-blue-700 transition py-3 rounded-full text-lg shadow-md">
          Login
        </button>

        <!-- Divider -->
        <div class="flex items-center my-8">
          <div class="flex-grow h-px bg-gray-600"></div>
          <span class="px-3 text-gray-500 text-sm">or continue with</span>
          <div class="flex-grow h-px bg-gray-600"></div>
        </div>

        <!-- Google -->
        <div class="flex justify-center mb-6">
          <div class="w-12 h-12 rounded-full bg-gray-700 flex items-center justify-center text-lg cursor-pointer hover:bg-gray-600">
            G
          </div>
        </div>

        <!-- Signup -->
        <p class="text-center text-gray-400">
          Don’t have an account? 
          <span class="text-blue-400 cursor-pointer hover:underline">Sign up</span>
        </p>

      </div>

    </div>
  </div>

</body>
</html>
